name: Deploy Website via SFTP

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: SFTP Deploy
      uses: sebastianpopp/ftp-action@v2.0.0
      with:
        # 强制指定使用 SFTP 协议
        protocol: sftp
        
        host: ${{ secrets.SFTP_HOST }}
        port: ${{ secrets.SFTP_PORT }}
        user: ${{ secrets.SFTP_USER }}
        
        # 传入你的私钥
        privateKey: ${{ secrets.SFTP_PRIVATE_KEY }}
        
        # 本地要上传的文件夹（仓库根目录）
        localDir: "."
        
        # 远程主机的目标目录（对应你的 abc-com）
        remoteDir: "${{ secrets.SFTP_DIR }}"
        
        # 关键配置：有些服务器严格限制权限，需要关闭临时文件扩展名传输
        forcePasv: true
