name: Deploy Website via SFTP

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: SFTP Deploy
      uses: samuelmeuli/action-sftp-deploy@v1.3.0
      with:
        # 对应你的 Secrets 变量名
        server: ${{ secrets.SFTP_HOST }}
        port: ${{ secrets.SFTP_PORT }}
        username: ${{ secrets.SFTP_USER }}
        ssh_private_key: ${{ secrets.SFTP_PRIVATE_KEY }}
        
        # 本地需要上传的路径（仓库根目录）
        local_path: "./"
        
        # 远程主机的目标目录（你的 abc-com 文件夹）
        remote_path: "${{ secrets.SFTP_DIR }}"
        
        # 🌟 关键参数：对于权限受限的主机，关闭自动创建目录的功能
        # 这样它绝对不会去碰你的上一级根目录，而是直接往 abc-com 里面写文件
        create_remote_path: false
