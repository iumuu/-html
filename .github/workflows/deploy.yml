name: Deploy Website via SFTP

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 借助原生 Linux 命令行通过 sftp 上传文件
    - name: SFTP Deploy via Native CLI
      env:
        SFTP_HOST: ${{ secrets.SFTP_HOST }}
        SFTP_PORT: ${{ secrets.SFTP_PORT }}
        SFTP_USER: ${{ secrets.SFTP_USER }}
        SFTP_DIR: ${{ secrets.SFTP_DIR }}
        SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
      run: |
        # 创建一个安全的临时目录存放私钥
        mkdir -p ~/.ssh
        
        # 将密钥写入文件，并强制恢复多行换行符，确保 Ed25519 正常解析
        echo "$SFTP_PRIVATE_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        
        # 禁用严格的主机密钥检查（防止首次连接弹窗确认中断）
        echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config

        # 核心：使用原生 sftp 批量传输文件
        # -b - 表示从标准输入读取 sftp 指令
        # cd 进入你的域名文件夹，put -r . 把当前目录所有文件推上去
        sftp -P $SFTP_PORT -i ~/.ssh/id_ed25519 $SFTP_USER@$SFTP_HOST <<EOF
          cd $SFTP_DIR
          put -r .
          quit
        EOF

        # 清理密钥，确保安全
        rm -rf ~/.ssh/id_ed25519
