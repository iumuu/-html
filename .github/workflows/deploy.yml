name: Deploy to TierHive

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Setup SSH Key
        env:
          PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
        run: |
          # 1. 创建并严格限制 .ssh 目录权限
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 2. 安全写入私钥，确保换行符不被破坏
          cat << 'EOF' > ~/.ssh/id_ed25519
          $PRIVATE_KEY
          EOF
          chmod 600 ~/.ssh/id_ed25519
          
          # 3. 扫描目标服务器指纹
          ssh-keyscan -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload Files
        run: |
          set -x
          
          # 4. 配置 SSH 客户端规则（解决 lftp 传递 -o 参数可能失败的问题）
          cat << 'EOF' >> ~/.ssh/config
          Host ${{ secrets.SFTP_HOST }}
            HostName ${{ secrets.SFTP_HOST }}
            Port ${{ secrets.SFTP_PORT }}
            User ${{ secrets.SFTP_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

          # 5. 执行干净的 lftp 同步命令
          lftp -e "
          set net:max-retries 2;
          set sftp:auto-confirm yes;
          mirror -R --delete --verbose ./ /${{ secrets.SFTP_DIR }}/;
          bye
          " sftp://${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_PORT }}
