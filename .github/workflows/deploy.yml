name: Deploy Website via SFTP

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: SFTP Deploy
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.SFTP_USER }}
        server: ${{ secrets.SFTP_HOST }}
        port: ${{ secrets.SFTP_PORT }}
        ssh_private_key: ${{ secrets.SFTP_PRIVATE_KEY }}
        
        # 核心：这里会自动读取你设置的 "abc-com"
        # 插件在连接后，会直接将 local_path 里的内容传进这个文件夹内部
        remote_path: ${{ secrets.SFTP_DIR }}
        
        # 你的 HTML 文件所在的本地目录（"./" 代表仓库根目录下的 index.html 等直接传过去）
        local_path: "./"
